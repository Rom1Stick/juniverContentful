server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Racine : servir /public/index.html (rewrite interne, garde le port/URL)
    location = / {
        rewrite ^ /public/index.html last;
    }

    # /admin/ : servir admin.html en index
    location /admin/ {
        index admin.html;
        try_files $uri $uri/ /admin/admin.html;
    }

    # /public/* et /config/* et /assets/image/* : servis tels quels
    location /public/ {
        try_files $uri $uri/ =404;
    }

    location /config/ {
        try_files $uri =404;
    }

    # /assets/image/ existe à la racine (images), on garde l'accès direct
    location /assets/image/ {
        try_files $uri =404;
    }

    # Cache assets statiques
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        try_files $uri /public$uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js|map)$ {
        try_files $uri /public$uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Fallback général (miroir Netlify : /* -> /public/:splat 200)
    location / {
        try_files $uri /public$uri /public/index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
