<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JuniverSanté — Programme & calendrier</title>
    <meta
      name="description"
      content="Calendrier des évènements du cercle JuniverSanté : ateliers, rencontres et temps forts à venir en Bourgogne."
    />
    <link rel="stylesheet" href="/public/assets/styles/main.min.css" />
  </head>
  <body class="calendar-page">
    <div data-slot="ambient"></div>
    <div class="wrap">
      <div data-slot="header"></div>

      <main class="calendar-main">
        <section>
          <div class="sec-head">
            <span class="sec-eyebrow" data-editable="calendar-page.eyebrow">Programme formation</span>
            <h2>
              <span data-editable="calendar-page.title.before">Les</span>
              <span class="hand" data-editable="calendar-page.title.hand">saisons</span>
              <span data-editable="calendar-page.title.after">qui viennent.</span>
            </h2>
            <p data-editable="calendar-page.lede">
              Quelques rendez-vous publics, d'autres sur inscription. Le calendrier vit au rythme du cercle.
            </p>
          </div>
          <img
            class="page-hero-illustration"
            src="/public/assets/image/hero-calendar-default.svg"
            alt="Illustration calendrier"
            data-editable-image="calendar.page.illustration"
          />

          <div class="calendar-main-grid">
            <div>
              <div id="upcoming-events">
                <h2 data-editable="calendar-page.upcoming">À venir</h2>
                <ul id="event-list"></ul>
              </div>

              <button id="toggle-past-events" type="button">← Afficher les événements passés</button>

              <div id="past-events-section" style="display: none">
                <h2 data-editable="calendar-page.past">Déjà passés</h2>
                <ul id="past-event-list"></ul>
              </div>
            </div>

            <div id="calendar-container">
              <div id="calendar"></div>
            </div>
          </div>
        </section>
      </main>

      <div data-slot="footer"></div>
    </div>

    <script type="module" src="/public/js/views/calendar.js?v=symbiose-7"></script>
  </body>
</html>
