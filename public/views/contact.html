<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JuniverSanté — Nous écrire</title>
    <meta
      name="description"
      content="Contactez le cercle JuniverSanté : un message, une question, une envie de rejoindre nos thérapeutes en Bourgogne."
    />
    <link rel="stylesheet" href="/public/assets/styles/main.min.css" />
  </head>
  <body class="contact-page">
    <div data-slot="ambient"></div>
    <div class="wrap">
      <div data-slot="header"></div>

      <main class="contact-main">
        <section>
          <div class="contact">
            <div class="contact-left">
              <span class="sec-eyebrow" style="margin-bottom: 16px" data-editable="contact.eyebrow"
                >VI · Nous écrire</span
              >
              <h2>
                <span data-editable="contact.title.before">Une question ?</span>
                <span class="hand" data-editable="contact.title.hand">Écrivez-nous.</span>
              </h2>
              <p data-editable="contact.lede">
                Pour s'inscrire à un atelier, rejoindre le cercle ou simplement échanger. Les praticiens lisent les
                messages à tour de rôle, dans la semaine.
              </p>
              <div class="info">
                <div><span class="ic">✉</span><span data-editable="contact.email">contact@juniversante.fr</span></div>
                <div><span class="ic">◎</span><span data-editable="contact.location">Bourgogne, France</span></div>
                <div><span class="ic">↬</span><span data-editable="contact.delay">Réponse sous 3-5 jours</span></div>
              </div>
            </div>
            <form
              id="contact-form"
              class="contact-form"
              name="contact"
              method="POST"
              data-netlify="true"
              action="/public/views/succes.html"
            >
              <input type="hidden" name="form-name" value="contact" />
              <div class="row">
                <div class="field">
                  <label for="name">Nom</label>
                  <input id="name" name="name" type="text" required />
                </div>
                <div class="field">
                  <label for="email">Email</label>
                  <input id="email" name="email" type="email" required />
                </div>
              </div>
              <div class="field">
                <label for="subject">Sujet</label>
                <input id="subject" name="subject" type="text" />
              </div>
              <div class="field">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
              </div>
              <button class="submit" type="submit" data-editable="contact.submit">Envoyer le message →</button>
              <span class="hint" data-editable="contact.hint">↬ merci de prendre ce temps</span>
            </form>
          </div>
        </section>
      </main>

      <div data-slot="footer"></div>
    </div>

    <script type="module" src="/public/js/chrome.js"></script>
    <script type="module" src="/public/js/mycel.js"></script>
    <script type="module" src="/public/js/siteCopy.js"></script>
  </body>
</html>
