<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JuniverSanté — Nos ateliers hebdomadaires</title>
    <meta
      name="description"
      content="Ateliers du cercle JuniverSanté : médecines douces, plantes, soins naturels — animés par nos thérapeutes en Bourgogne."
    />
    <link rel="stylesheet" href="/public/assets/styles/main.min.css" />
  </head>
  <body class="workshop-page">
    <div data-slot="ambient"></div>
    <div class="wrap">
      <div data-slot="header"></div>

      <main class="workshop-main">
        <section class="workshop-hero">
          <span class="sec-eyebrow" data-editable="workshop-page.eyebrow">Ateliers hebdomadaires</span>
          <h1>
            <span data-editable="workshop-page.title.before">Chaque semaine,</span>
            <span class="hand" data-editable="workshop-page.title.hand">on se rassemble</span><br />
            <span data-editable="workshop-page.title.after">pour apprendre avec le vivant.</span>
          </h1>
          <p data-editable="workshop-page.lede">
            Petits groupes, cadres accueillants. Cueillette, respiration, cuisine vivante, lecture de paysage — les
            ateliers du cercle sont pensés pour être accessibles et reproduits chez soi.
          </p>
          <img
            class="page-hero-illustration"
            src="/public/assets/image/hero-workshop-default.svg"
            alt="Illustration ateliers"
            data-editable-image="workshop.page.illustration"
          />
        </section>

        <section>
          <div id="workshop-list"></div>
        </section>
      </main>

      <div data-slot="footer"></div>
    </div>

    <script type="module" src="/public/js/views/workshop.js?v=symbiose-7"></script>
  </body>
</html>
