[build]
  publish = "/"
  command = "npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API → Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Static site routing (identique aux _redirects / nginx)
[[redirects]]
  from = "/"
  to = "/public/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/public/:splat"
  status = 200

[dev]
  # live-server est substitué par netlify dev qui mounte les functions + le front
  port = 8888
  targetPort = 3000
  command = "npm run dev:serve"
  publish = "/"
  autoLaunch = false
